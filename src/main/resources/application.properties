# =========================================
# APPLICATION CONFIGURATION
# =========================================
spring.application.name=ProjectManagementSystem

server.port=8080

# =========================================
# DATABASE CONFIGURATION - MYSQL
# =========================================
spring.datasource.url=jdbc:mysql://localhost:3306/enterprise_assignment_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================
# JPA / HIBERNATE CONFIGURATION
# =========================================
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.open-in-view=false

# =========================================
# HIKARI CONNECTION POOL
# =========================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=ProjectManagementHikariCP
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# =========================================
# LOGGING CONFIGURATION
# =========================================
logging.level.root=INFO

logging.level.com.projectmanagement=DEBUG

logging.level.org.springframework.web=INFO

logging.level.org.hibernate.SQL=DEBUG

logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log file configuration
logging.file.name=logs/project-management.log

# Console log pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# File log pattern
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =========================================
# SWAGGER / OPENAPI CONFIGURATION
# =========================================
springdoc.api-docs.enabled=true

springdoc.swagger-ui.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html

springdoc.api-docs.path=/api-docs

# =========================================
# JACKSON CONFIGURATION
# =========================================
spring.jackson.serialization.fail-on-empty-beans=false

spring.jackson.default-property-inclusion=non_null

spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

spring.jackson.time-zone=Asia/Kolkata

# =========================================
# VALIDATION CONFIGURATION
# =========================================
spring.mvc.throw-exception-if-no-handler-found=true

spring.web.resources.add-mappings=false

# =========================================
# FILE UPLOAD CONFIGURATION
# =========================================
spring.servlet.multipart.enabled=true

spring.servlet.multipart.max-file-size=10MB

spring.servlet.multipart.max-request-size=10MB

# =========================================
# ACTUATOR CONFIGURATION
# =========================================
management.endpoints.web.exposure.include=*

management.endpoint.health.show-details=always

# =========================================
# PAGINATION DEFAULTS
# =========================================
app.pagination.default-page-size=10

app.pagination.max-page-size=100

# =========================================
# CUSTOM APPLICATION VARIABLES
# =========================================
app.name=Project Management System

app.version=1.0.0

app.description=Enterprise Project Management Backend API

# =========================================
# TIMEZONE CONFIGURATION
# =========================================
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# =========================================
# BANNER CONFIGURATION
# =========================================
spring.main.banner-mode=console

# =========================================
# DEVTOOLS CONFIGURATION
# =========================================
spring.devtools.restart.enabled=true

spring.devtools.livereload.enabled=true